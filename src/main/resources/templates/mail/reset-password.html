<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{mail/layout}">
<body>

<div layout:fragment="content">
  <section class="main-content">
    <h1>Reset Your Password</h1>
    <p class="tagline"><span th:text="${greeting}"></span>, <span th:text="${firstname}"></span></p>

    <p class="pointer">You requested to reset your password. Please copy the token below and include it in your request header as:</p>
    <p style="margin-top: 5px"><code>Authorization: Bearer &lt;token&gt;</code></p>

    <div style="background: #f3f4f6; padding: 12px; border-radius: 6px; margin: 15px 0; font-family: monospace; font-size: 16px; color: #1f2937;">
      <span th:text="${token}"></span>
    </div>

    <div class="action-btn">
      <button>
        <a th:href="${baseUrl} + 'Authentication/resetPassword' ">Click to Reset Password</a>
      </button>
    </div>

    <h3 style="margin-top: 40px">Note:</h3>
    <p class="pointer" style="margin-top: 5px">This token will expire in 15 minutes. If you didn't click reset password please ignore this mail</p>
  </section>
</div>
</body>
</html>
